name: Altide Data Robot Manager

on:
  repository_dispatch:
    types: [altide_edit_request]

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Khỏi Kho Dữ Liệu
        uses: actions/checkout@v4

      - name: Robot Sửa File data.json Theo Lệnh Ngầm
        run: |
          ACTION_TYPE="${{ github.event.client_payload.action }}"
          TARGET_TARGET="${{ github.event.client_payload.target_path }}"
          DATA_CONTENT="${{ github.event.client_payload.content }}"

          echo "🤖 Lệnh ngầm nhận được: $ACTION_TYPE"

          if [ ! -f data.json ]; then
            echo "{\"project_name\":\"altide_storage\",\"system_files\":{}}" > data.json
          fi

          if [ "$ACTION_TYPE" == "create_folder" ]; then
            jq --arg folder "$TARGET_TARGET" '.system_files[$folder] = {}' data.json > tmp.json && mv tmp.json data.json
          elif [ "$ACTION_TYPE" == "write_file" ]; then
            jq --arg folder "$TARGET_TARGET" --arg content "$DATA_CONTENT" '.system_files[$folder] = $content' data.json > tmp.json && mv tmp.json data.json
          elif [ "$ACTION_TYPE" == "delete_folder" ]; then
            jq --arg folder "$TARGET_TARGET" 'del(.system_files[$folder])' data.json > tmp.json && mv tmp.json data.json
          fi

      - name: Robot Tự Động Push Lưu Lại Dữ Liệu
        run: |
          git config --global user.name "altide-robot-manager"
          git config --global user.email "robot@altide.io"
          git add data.json
          git diff-index --quiet HEAD || (git commit -m "🤖 [altide] Cập nhật dữ liệu ngầm tự động" && git push origin HEAD)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
