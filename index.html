<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng dụng kết nối Data Altide</title>
    <style>
        body { background: #0d0f14; color: white; font-family: sans-serif; padding: 20px; }
        .data-box { background: #1a1d26; padding: 15px; border-radius: 8px; border: 1px solid #2d3446; margin-top: 15px; }
        .folder-item { background: #242936; padding: 10px; margin: 5px 0; border-radius: 6px; border-left: 4px solid #00a2ff; }
        button { background: #00a2ff; color: white; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h2>📱 Giao diện App/Game của An Bro</h2>
    <p>Trang này đang kết nối trực tiếp đến cơ sở dữ liệu trung tâm GitHub...</p>
    
    <button onclick="taiDuLieuTuAltide()">🔄 LÀM MỚI DỮ LIỆU</button>

    <div class="data-box">
        <h4>🗄️ Dữ liệu lấy từ file data.json:</h4>
        <div id="hienThiData">Đang kết nối đến dữ liệu...</div>
    </div>

<script>
// ==================== CẤU HÌNH ĐƯỜNG TRUYỀN DATA ====================
const GITHUB_USER = "hothiptv"; // Tên tài khoản GitHub của ông
const REPO_NAME = "ten-repo-cua-ong"; // Điền đúng tên Repository chứa file data.json
// ====================================================================

async function taiDuLieuTuAltide() {
    const vungHienThi = document.getElementById('hienThiData');
    vungHienThi.innerText = "⏳ Đang tải dữ liệu mới nhất...";

    // Link lấy dữ liệu gốc (Raw) công khai từ GitHub Pages / GitHub Raw
    // Thêm ?t=${Date.now()} để ép trình duyệt luôn lấy data mới nhất, không bị lưu cache cũ
    const urlData = `https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/data.json?t=${Date.now()}`;

    try {
        const response = await fetch(urlData);
        if(!response.ok) throw new Error("Không thể kết nối đến kho dữ liệu GitHub!");

        const data = await response.json();
        
        // Bắt đầu xử lý và hiển thị dữ liệu lên giao diện HTML này
        vungHienThi.innerHTML = `<strong>Tên dự án:</strong> ${data.project_name}<br><br>`;
        
        const files = data.system_files;
        if (Object.keys(files).length === 0) {
            vungHienThi.innerHTML += "📂 Kho lưu trữ hiện tại đang trống rỗng.";
        } else {
            vungHienThi.innerHTML += `<strong>Các mục dữ liệu tìm thấy:</strong>`;
            for (let folderName in files) {
                // Lấy nội dung bên trong mục dữ liệu
                let noiDung = files[folderName];
                // Nếu nội dung là object trống (thư mục ảo), ghi là Thư mục rỗng
                if(typeof noiDung === 'object' && Object.keys(noiDung).length === 0) {
                    noiDung = "<i>(Thư mục rỗng)</i>";
                }

                vungHienThi.innerHTML += `
                    <div class="folder-item">
                        <strong>📁 ${folderName}:</strong> ${noiDung}
                    </div>
                `;
            }
        }

    } catch (err) {
        vungHienThi.innerHTML = `<span style="color:#ff5252;">❌ Lỗi kết nối: ${err.message}</span>`;
    }
}

// Tự động gọi tải dữ liệu ngay khi file HTML này vừa được mở lên
taiDuLieuTuAltide();
</script>
</body>
</html>
