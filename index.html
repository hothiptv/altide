<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Altide Robot Controller</title>
    <style>
        body { background: #0d0f14; color: white; font-family: sans-serif; padding: 15px; text-align: center; }
        .box { background: #1a1d26; padding: 20px; border-radius: 12px; border: 1px solid #2d3446; max-width: 400px; margin: 20px auto; text-align: left; }
        h3 { margin-top: 0; color: #00a2ff; text-align: center; }
        label { font-size: 12px; color: #8e99a8; display: block; margin-top: 12px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 5px 0 10px 0; border-radius: 8px; border: 1px solid #343c50; background: #242936; color: white; box-sizing: border-box; font-family: sans-serif; }
        button { width: 100%; background: #00a2ff; color: white; border: none; padding: 13px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        button:active { background: #0082cc; }
        #console { background: #000; padding: 12px; border-radius: 6px; font-family: monospace; font-size: 12px; color: #00e676; max-height: 180px; overflow-y: auto; margin-top: 15px; white-space: pre-wrap; border: 1px solid #242936; }
    </style>
</head>
<body>

    <div class="box">
        <h3>🤖 BÀN ĐIỀU KHIỂN ROBOT [altide]</h3>
        
        <label>Chọn hành động cho Robot:</label>
        <select id="actionType">
            <option value="create_folder">📁 Tạo mục/thư mục chứa dữ liệu mới</option>
            <option value="write_file">📝 Ghi dữ liệu vào mục sẵn có</option>
        </select>

        <label>Tên mục tác động (Ví dụ: "tailieu_game", "user_setting"):</label>
        <input type="text" id="targetPath" placeholder="Nhập tên mục...">

        <label>Nội dung dữ liệu (Chỉ cần điền nếu chọn ghi dữ liệu):</label>
        <textarea id="textContent" rows="3" placeholder="Nhập chuỗi văn bản hoặc dữ liệu cần lưu..."></textarea>
        
        <button onclick="raLenhChoRobot()">⚡ PHÁT LỆNH CHO ROBOT CHỈNH SỬA</button>

        <div id="console">&gt;_ Robot đang túc trực lệnh...</div>
    </div>

<script>
// ==================== CẤU HÌNH GITHUB ====================
const GITHUB_USER = "ten-tai-khoan-github-cua-ong";
const REPO_NAME = "altide-data";
const TRIGGER_TOKEN = "ghp_token_cua_ong_ban"; 
// ========================================================

const logger = document.getElementById('console');
function log(text, color = "#00e676") {
    logger.innerHTML += `\n<span style="color:${color}">&gt; ${text}</span>`;
    logger.scrollTop = logger.scrollHeight;
}

async function raLenhChoRobot() {
    const action = document.getElementById('actionType').value;
    const targetPath = document.getElementById('targetPath').value.trim();
    const content = document.getElementById('textContent').value.trim();

    if(!targetPath) return log("⚠️ Thất bại: Thiếu tên mục tác động!", "#ff5252");

    log("🛰️ Đang truyền tín hiệu mã hóa cho Robot...", "#ffb300");

    try {
        // Gửi gói tin dispatch kích hoạt robot chạy
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/dispatches`, {
            method: 'POST',
            headers: {
                'Authorization': `token ${TRIGGER_TOKEN}`,
                'Accept': 'application/vnd.github.v3+json',
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                event_type: "altide_edit_request",
                client_payload: {
                    action: action,
                    target_path: targetPath,
                    content: content
                }
            })
        });

        if(res.status === 204) {
            log("🚀 Robot đã nhận lệnh thành công! Nó đang mở file data.json ra chỉnh sửa trên hệ thống đám mây ngầm (Mất 5-10s)...", "#00a2ff");
        } else {
            log("❌ Lỗi gửi lệnh: Kiểm tra lại Token hoặc tên cấu hình Repo!", "#ff5252");
        }

    } catch (err) {
        log("💥 Thất bại: " + err.message, "#ff5252");
    }
}
</script>
</body>
</html>
